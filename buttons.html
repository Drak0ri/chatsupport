<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IESV Support Alert</title>
<link rel="icon" href="ies.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --text: #e8e9ed;
    --text-muted: #8b8fa3;
    --green: #22c55e;
    --green-glow: rgba(34, 197, 94, 0.25);
    --yellow: #eab308;
    --yellow-glow: rgba(234, 179, 8, 0.25);
    --red: #ef4444;
    --red-glow: rgba(239, 68, 68, 0.25);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.6s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-area h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .logo-area p {
    color: var(--text-muted);
    font-size: 0.875rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 28px 24px;
  }

  .field-label {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .field-row {
    display: flex;
    gap: 10px;
  }

  .name-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input::placeholder {
    color: #3a3d4a;
    font-size: 0.85rem;
  }

  .name-input:focus {
    border-color: #4a4d5a;
  }

  .room-input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.03em;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
  }

  .room-input::placeholder {
    color: #3a3d4a;
    text-transform: none;
    font-size: 0.85rem;
  }

  .room-input:focus {
    border-color: #4a4d5a;
  }

  .message-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 42px;
    margin-top: 10px;
  }

  .message-input::placeholder {
    color: #3a3d4a;
    font-size: 0.8rem;
  }

  .message-input:focus {
    border-color: #4a4d5a;
  }

  .divider {
    height: 1px;
    background: var(--card-border);
    margin: 20px 0;
  }

  .priority-label {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .buttons {
    display: flex;
    gap: 12px;
  }

  .alert-btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 20px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .alert-btn:active { transform: scale(0.95); }

  .alert-btn .icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    position: relative;
    z-index: 1;
  }

  .alert-btn .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
  }

  .btn-green {
    background: linear-gradient(145deg, #143d25, #0f2e1c);
    box-shadow: 0 0 0 1px rgba(34,197,94,0.2);
  }
  .btn-green:hover, .btn-green:focus { box-shadow: 0 0 20px var(--green-glow), 0 0 0 1px rgba(34,197,94,0.4); }
  .btn-green .icon { background: var(--green); color: #052e16; }
  .btn-green .label { color: var(--green); }

  .btn-yellow {
    background: linear-gradient(145deg, #3d3514, #2e280f);
    box-shadow: 0 0 0 1px rgba(234,179,8,0.2);
  }
  .btn-yellow:hover, .btn-yellow:focus { box-shadow: 0 0 20px var(--yellow-glow), 0 0 0 1px rgba(234,179,8,0.4); }
  .btn-yellow .icon { background: var(--yellow); color: #422d09; }
  .btn-yellow .label { color: var(--yellow); }

  .btn-red {
    background: linear-gradient(145deg, #3d1414, #2e0f0f);
    box-shadow: 0 0 0 1px rgba(239,68,68,0.2);
  }
  .btn-red:hover, .btn-red:focus { box-shadow: 0 0 20px var(--red-glow), 0 0 0 1px rgba(239,68,68,0.4); }
  .btn-red .icon { background: var(--red); color: #450a0a; }
  .btn-red .label { color: var(--red); }

  .btn-resolved {
    flex-direction: row;
    justify-content: center;
    padding: 14px 8px;
    border-radius: 14px;
    background: linear-gradient(145deg, #1a2333, #151c28);
    box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.2);
  }
  .btn-resolved:hover, .btn-resolved:focus { box-shadow: 0 0 20px rgba(96, 165, 250, 0.2), 0 0 0 1px rgba(96, 165, 250, 0.4); }
  .btn-resolved .icon { background: #60a5fa; color: #1e3a5f; width: 28px; height: 28px; font-size: 0.9rem; }
  .btn-resolved .label { color: #60a5fa; }

  .btn-omw {
    flex-direction: row;
    justify-content: center;
    padding: 14px 8px;
    border-radius: 14px;
    background: linear-gradient(145deg, #2d2314, #231c0f);
    box-shadow: 0 0 0 1px rgba(251, 191, 36, 0.2);
  }
  .btn-omw:hover, .btn-omw:focus { box-shadow: 0 0 20px rgba(251, 191, 36, 0.2), 0 0 0 1px rgba(251, 191, 36, 0.4); }
  .btn-omw .icon { background: transparent; width: 28px; height: 28px; font-size: 1.1rem; }
  .btn-omw .label { color: #fbbf24; }

  .response-buttons {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .resolved-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }

  .resolved-input::placeholder { color: #3a3d4a; text-transform: none; font-size: 0.85rem; }
  .resolved-input:focus { border-color: #4a4d5a; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 0.9rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s ease; border-color: var(--red) !important; }

  .alert-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .alert-btn:active::after { opacity: 1; }

  .footer { text-align: center; margin-top: 24px; font-size: 0.7rem; color: #3a3d4a; letter-spacing: 0.04em; }

  .demo-banner {
    position: fixed; top: 0; left: 0; right: 0;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: white; text-align: center; padding: 6px;
    font-size: 0.75rem; font-weight: 500; letter-spacing: 0.03em; z-index: 100;
  }

  .chat-toggle {
    position: fixed; bottom: 24px; right: 24px;
    width: 52px; height: 52px; border-radius: 50%; border: none;
    background: linear-gradient(145deg, #2563eb, #1d4ed8);
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
    color: white; font-size: 1.4rem; cursor: pointer; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .chat-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(37, 99, 235, 0.5); }
  .chat-toggle:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="demo-banner" id="demoBanner" style="display:none">Not connected — set RELAY_URL in code</div>

<div class="container">
  <div class="logo-area">
    <img src="logo-negative.png" alt="IES Logo" style="height:48px; margin-bottom:12px; opacity:0.85;">
    <h1>Support Alert</h1>
    <p>Request classroom support</p>
  </div>

  <div class="card">
    <div class="field-label">Room & Your Name</div>
    <div class="field-row">
      <input type="text" class="room-input" id="roomInput" placeholder="e.g. A11" maxlength="30" autocomplete="off" spellcheck="false">
      <input type="text" class="name-input" id="nameInput" placeholder="Name (optional)" maxlength="30" autocomplete="off" spellcheck="false">
    </div>
    <textarea class="message-input" id="messageInput" placeholder="Add a message (optional)" maxlength="200"></textarea>

    <div class="divider"></div>

    <div class="priority-label">What do you need?</div>
    <div class="buttons">
      <button class="alert-btn btn-green" onclick="sendAlert('green', 'Cover Me')" title="Cover Me">
        <div class="icon">✓</div>
        <div class="label">Cover Me</div>
      </button>
      <button class="alert-btn btn-yellow" onclick="sendAlert('yellow', 'Support')" title="Support">
        <div class="icon">!</div>
        <div class="label">Support</div>
      </button>
      <button class="alert-btn btn-red" onclick="sendAlert('red', 'Urgent')" title="Urgent">
        <div class="icon">⚠</div>
        <div class="label">Urgent</div>
      </button>
    </div>

    <div class="divider"></div>

    <div class="priority-label">Respond</div>
    <input type="text" class="resolved-input" id="resolvedRoom" placeholder="Room (optional)" maxlength="30" autocomplete="off" spellcheck="false">
    <div class="response-buttons">
      <button class="alert-btn btn-omw" onclick="sendOMW()" title="On My Way">
        <div class="icon">🏃</div>
        <div class="label">On My Way</div>
      </button>
      <button class="alert-btn btn-resolved" onclick="sendResolved()" title="Resolved">
        <div class="icon">✓</div>
        <div class="label">Resolved</div>
      </button>
    </div>
  </div>

  <div class="footer">IESV Classroom Support System</div>
</div>

<div class="toast" id="toast">
  <span class="dot" id="toastDot"></span>
  <span id="toastMsg"></span>
</div>

<button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="Open Chat">💬</button>

<script>
  const roomInput = document.getElementById('roomInput');
  const nameInput = document.getElementById('nameInput');
  const messageInput = document.getElementById('messageInput');
  const toast = document.getElementById('toast');
  const toastDot = document.getElementById('toastDot');
  const toastMsg = document.getElementById('toastMsg');

  // Apps Script relay URL - replace with your deployed web app URL
    const RELAY_URL = 'https://script.google.com/macros/s/AKfycbyhsmQ6p5ZOg7rGPsaiiuYkJcPf6vV69_nk4zr1qFzqol2INEhTU_pSHIV40DBv6uIa/exec';
    const SECRET_KEY = 'nc3rq7ncqr3nnrcq3'; // must match the key in your Apps Script

  let toastTimer;

  // Load saved name from cookie
  const savedName = document.cookie.split('; ').find(c => c.startsWith('sa_name='));
  if (savedName) nameInput.value = decodeURIComponent(savedName.split('=')[1]);

  // Save name on change
  nameInput.addEventListener('input', () => {
    document.cookie = 'sa_name=' + encodeURIComponent(nameInput.value.trim()) + '; max-age=31536000; path=/';
  });

  function getName() { return nameInput.value.trim(); }
  function getMessage() { return messageInput.value.trim(); }

  function buildExtra(name, msg) {
    const parts = [];
    if (name) parts.push(name);
    if (msg) parts.push(msg);
    return parts.length ? ' (' + parts.join(': ') + ')' : '';
  }

  function showToast(color, text) {
    toastDot.style.background = color;
    toastMsg.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function sendAlert(color, label) {
    const room = roomInput.value.trim().toUpperCase();
    if (!room) {
      roomInput.classList.add('shake');
      roomInput.focus();
      setTimeout(() => roomInput.classList.remove('shake'), 400);
      return;
    }

    const colors = { green: '#22c55e', yellow: '#eab308', red: '#ef4444' };

    fetch(RELAY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ room, level: color, label, name: getName(), message: getMessage(), key: SECRET_KEY })
    }).catch(err => console.error('Send failed:', err));

    showToast(colors[color], `${room} — ${label} sent`);
    roomInput.value = '';
    messageInput.value = '';
    roomInput.focus();
  }

  function sendResolved() {
    const room = document.getElementById('resolvedRoom').value.trim().toUpperCase();
    fetch(RELAY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ room, level: 'blue', label: 'Resolved', name: getName(), message: '', key: SECRET_KEY })
    }).catch(err => console.error('Send failed:', err));
    showToast('#60a5fa', `${room || 'No room'} — Resolved sent`);
    document.getElementById('resolvedRoom').value = '';
  }

  function sendOMW() {
    const room = document.getElementById('resolvedRoom').value.trim().toUpperCase();
    fetch(RELAY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ room, level: 'omw', label: 'On My Way', name: getName(), message: '', key: SECRET_KEY })
    }).catch(err => console.error('Send failed:', err));
    showToast('#fbbf24', `${room || 'No room'} — On My Way sent`);
    document.getElementById('resolvedRoom').value = '';
  }

  roomInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && roomInput.value.trim()) sendAlert('yellow', 'Support');
  });

  const CHAT_URL = 'https://chat.google.com/room/AAAAiOwecko?cls=7';
  function toggleChat() { window.open(CHAT_URL, '_blank'); }

  roomInput.focus();
  if (RELAY_URL.includes('PASTE_')) document.getElementById('demoBanner').style.display = 'block';
</script>
</body>
</html>
